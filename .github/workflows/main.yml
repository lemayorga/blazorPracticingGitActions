# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Publish Test

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AZURE_WEBAPP_NAME:  'demoAppGithub01'
  AZURE_WEBAPP_PACKAGE_PATCH: './publish'
jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore ./MyBlazorApp.sln
      
    - name: Build
      run: dotnet build ./MyBlazorApp.sln --configuration  Release --no-restore
      
    - name: Publish
      run: dotnet publish ./MyBlazorApp.sln --configuration  Release --no-build --property:PublishDir='${{ env.AZURE_WEBAPP_PACKAGE_PATCH }}'

    - name: Deploy
      uses: azure/webapps-deploy@v3
      with:
        app-name:  ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{  secrets.AZURE_CREDENTIALS }}
        package: "${{ env.AZURE_WEBAPP_PACKAGE_PATCH }}"
        
        
